name: Atualizar Clipping

on:
  schedule:
      - cron: '*/10 * * * *'
        workflow_dispatch:

        permissions:
          contents: write

          jobs:
            gerar:
                runs-on: ubuntu-latest
                    steps:
                          - name: Checkout do repositorio
                                  uses: actions/checkout@v4

                                        - name: Configurar Python
                                                uses: actions/setup-python@v5
                                                        with:
                                                                  python-version: '3.11'

                                                                        - name: Instalar dependencias
                                                                                run: pip install feedparser pytz

                                                                                      - name: Gerar clipping Brasil
                                                                                              run: python gerar_clipping.py

                                                                                                    - name: Gerar clipping Internacional
                                                                                                            run: python gerar_clipping_intl.py
                                                                                                            
                                                                                                                  - name: Commit e push
                                                                                                                          run: |
                                                                                                                                    git config user.name "github-actions[bot]"
                                                                                                                                              git config user.email "github-actions[bot]@users.noreply.github.com"
                                                                                                                                                        git add index.html index_intl.html
                                                                                                                                                                  git diff --cached --quiet || git commit -m "Atualizacao automatica do clipping"
                                                                                                                                                                            git push
